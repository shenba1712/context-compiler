# Render Blueprint — deploy the web demo as a Docker web service.
# https://render.com/docs/blueprint-spec
#
# One-click deploy: push this repo, then in Render choose "New +" → "Blueprint"
# and point it at this repo. Render builds the Dockerfile (Node + the Python
# markitdown converter, all in one image) and starts `node dist/web.js`.
#
# The two API keys below are marked `sync: false`, so Render does NOT read them
# from this file — it prompts you to enter them in the dashboard on first
# deploy, and keeps them as encrypted secrets out of source control. Both are
# optional: with neither set, the demo still runs fully (BM25 ranking, both MCP
# tools, conversion) — the keys only unlock answer-parity and agent mode, with
# automatic Gemini → OpenRouter failover.
services:
  - type: web
    name: context-compiler
    runtime: docker
    plan: free # free spins down after ~15 min idle; next hit = ~30–60s cold start. Ping /healthz or use Starter for always-on.
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true # redeploy on every push to the connected branch
    envVars:
      # Primary provider — Google Gemini free tier (no card). Enter in dashboard.
      - key: GEMINI_API_KEY
        sync: false
      # Fallback provider — OpenRouter. Used automatically if Gemini errors.
      - key: OPENROUTER_API_KEY
        sync: false
      # Random secret for GET /metrics (Bearer token). Not needed for the demo UI.
      - key: CC_METRICS_TOKEN
        generateValue: true
      # One hop of reverse-proxy trust (Render). Not `true` — that would let
      # clients spoof X-Forwarded-For and bypass rate limits.
      - key: CC_TRUST_PROXY
        value: "1"
      # Abuse / cost knobs (also pinned in the Dockerfile; listed here so the
      # dashboard shows them and you can tweak without a rebuild).
      - key: CC_MAX_FILE_BYTES
        value: "20971520"
      - key: CC_RATE_LIMIT
        value: "100"
      - key: CC_RATE_COST_AGENT
        value: "12"
      - key: CC_RATE_COST_ANSWER
        value: "4"
      - key: CC_MAX_CONCURRENT_LLM
        value: "2"
      - key: CC_MAX_CONCURRENT_CONVERSIONS
        value: "3"
      - key: CC_MAX_QUEUED_CONVERSIONS
        value: "12"
      - key: CC_LLM_TIMEOUT_MS
        value: "30000"
      # Do NOT set PORT here — Render injects it automatically and the app binds
      # to it. Model/endpoint overrides (CC_GEMINI_MODEL, CC_OPENROUTER_MODEL,
      # ...) can be added in the dashboard if you ever need them.
